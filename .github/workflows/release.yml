name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Windows: electron-builder extracts winCodeSign with darwin .dylib symlinks.
      # Developer Mode must be enabled on the runner (Settings → Privacy & Security → For developers).
      # GitHub-hosted windows-latest runners have Developer Mode enabled by default.
      - run: pnpm package

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release/
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
