appId: dev.supaworkspace.app
productName: SupaWorkspace
copyright: Copyright © 2026

npmRebuild: false
buildDependenciesFromSource: false

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"

extraResources:
  - from: node_modules/@homebridge/node-pty-prebuilt-multiarch/build/Release
    to: app.asar.unpacked/node_modules/@homebridge/node-pty-prebuilt-multiarch/build/Release
    filter:
      - "**/*"

asarUnpack:
  - "**/@homebridge/**"

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: "${productName}-${version}-${arch}-setup.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [universal]
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-${arch}.${ext}"
  # Microphone access for push-to-talk voice capture. macOS refuses
  # getUserMedia({ audio }) without this Info.plist string; the OS shows it in
  # the permission prompt. Windows grants mic via the system privacy prompt (no
  # manifest capability needed for an unpackaged NSIS desktop app); Linux routes
  # through the PipeWire portal at runtime.
  extendInfo:
    NSMicrophoneUsageDescription: "SupaWorkspace uses the microphone for push-to-talk voice input into Claude sessions. Audio is transcribed locally and never leaves your machine."

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"
